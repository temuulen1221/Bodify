name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ─────────────────────────────────────────────
  # Job 1: Jest suite (Expo / React Native app)
  # ─────────────────────────────────────────────
  jest:
    name: Jest Tests (Expo App)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run Jest test suite
        run: npm test -- --ci --forceExit --passWithNoTests

  # ─────────────────────────────────────────────
  # Job 2: Vitest suite (CharacterStudio)
  # ─────────────────────────────────────────────
  vitest:
    name: Vitest Tests (CharacterStudio)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: CharacterStudio/package-lock.json

      - name: Install CharacterStudio dependencies
        working-directory: CharacterStudio
        run: npm ci

      - name: Run Vitest suite
        working-directory: CharacterStudio
        run: npm run test:run

  # ─────────────────────────────────────────────
  # Job 3: Firebase Functions TypeScript build
  # ─────────────────────────────────────────────
  functions-build:
    name: Functions TypeScript Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: functions/package-lock.json

      - name: Install functions dependencies
        working-directory: functions
        run: npm ci

      - name: TypeScript build check
        working-directory: functions
        run: npx tsc --noEmit
