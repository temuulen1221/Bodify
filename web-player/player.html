<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>html,body,#app{height:100%;margin:0;padding:0;background:#000}</style>
</head>
<body>
  <div id="app"></div>
  <script src="https://unpkg.com/three@0.151.3/build/three.min.js"></script>
  <script src="https://unpkg.com/three@0.151.3/examples/js/loaders/GLTFLoader.js"></script>
  <script src="https://unpkg.com/@pixiv/three-vrm@1.0.10/dist/three-vrm.min.js"></script>
  <script>
    (function(){
      const container = document.getElementById('app');
      const renderer = new THREE.WebGLRenderer({antialias:true, alpha:true});
      renderer.setSize(window.innerWidth, 300);
      container.appendChild(renderer.domElement);
      const scene = new THREE.Scene();
      const camera = new THREE.PerspectiveCamera(45, window.innerWidth/300, 0.1, 1000);
      camera.position.set(0, 1.4, 2.0);
      const light = new THREE.DirectionalLight(0xffffff, 1);
      light.position.set(1,1,1);
      scene.add(light);
      const ambient = new THREE.AmbientLight(0xffffff, 0.5);
      scene.add(ambient);
      let vrm;
      function animate(){
        requestAnimationFrame(animate);
        if (vrm) vrm.scene.rotation.y += 0.01;
        renderer.render(scene, camera);
      }
      function send(type, payload){
        window.ReactNativeWebView && window.ReactNativeWebView.postMessage(JSON.stringify({type, payload}));
      }
      const loader = new THREE.GLTFLoader();
      window.loadModel = function(url){
        loader.load(url, function(gltf){
          THREE.VRM.from(gltf).then(function(loaded){
            vrm = loaded;
            scene.add(vrm.scene);
            send('ready');
          }).catch(function(err){
            send('error', String(err));
          });
        }, function(progress){
        }, function(err){
          send('error', String(err));
        });
      };
      animate();
      // report ready
      send('bridge-ready');
    })();
  </script>
</body>
</html>
