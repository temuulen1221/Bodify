<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Pose (Squat) Detector</title>
    <style>
      html, body { margin:0; padding:0; height:100%; background:#000; color:#eee; font-family: system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif; }
      #wrap { position:relative; width:100%; height:100%; overflow:hidden; background:#000; }
      #video { position:absolute; inset:0; width:100%; height:100%; object-fit:cover; transform: scaleX(-1); /* mirror for selfie */ }
      #overlay { position:absolute; inset:0; width:100%; height:100%; pointer-events:none; }
      #hud { position:absolute; left:12px; top:12px; padding:8px 10px; background:rgba(0,0,0,0.35); border-radius:10px; border:1px solid rgba(0,231,255,0.45); }
      #hud strong { color:#fff; }
      #status { position:absolute; right:12px; top:12px; padding:6px 10px; background:rgba(0,0,0,0.35); border-radius:10px; font-size:12px; opacity:0.8; }
      #help { position:absolute; left:12px; bottom:12px; max-width:60ch; font-size:12px; opacity:0.8; }
    </style>
  </head>
  <body>
    <div id="wrap">
      <video id="video" autoplay playsinline muted></video>
      <canvas id="overlay"></canvas>
      <div id="hud">Reps: <strong id="reps">0</strong></div>
      <div id="status">Starting…</div>
      <div id="help">Stand sideways-ish, perform squats. Counter uses knee angle. Down < 100°, up > 160°.</div>
    </div>

    <script>
      // Post messages to RN WebView (native) and to parent (iframe on web)
      function postMsg(type, payload){
        try { window.ReactNativeWebView && window.ReactNativeWebView.postMessage(JSON.stringify({type, payload})); } catch(_){}
        try { window.parent && window.parent !== window && window.parent.postMessage({type, payload}, '*'); } catch(_){}
      }
      const setStatus = (t) => { const el = document.getElementById('status'); if (el) el.textContent = t; };

      // Basic math helpers
      function angleDeg(ax, ay, bx, by, cx, cy){
        // Angle ABC in degrees
        const abx = ax - bx, aby = ay - by;
        const cbx = cx - bx, cby = cy - by;
        const dot = abx*cbx + aby*cby;
        const mag1 = Math.hypot(abx, aby) || 1e-6;
        const mag2 = Math.hypot(cbx, cby) || 1e-6;
        const cos = Math.max(-1, Math.min(1, dot / (mag1*mag2)));
        return Math.acos(cos) * 180 / Math.PI;
      }

      (async function(){
        // Dynamically load MediaPipe Tasks Vision UMD
        setStatus('Loading pose model…');
        const script = document.createElement('script');
        script.src = 'https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.10/vision_bundle.js';
        document.head.appendChild(script);
        await new Promise((res, rej) => { script.onload = res; script.onerror = rej; });

  var FilesetResolver = window.FilesetResolver || (window.vision && window.vision.FilesetResolver);
  var PoseLandmarker = window.PoseLandmarker || (window.vision && window.vision.PoseLandmarker);
  var DrawingUtils = window.DrawingUtils || (window.vision && window.vision.DrawingUtils);
  const fileset = await FilesetResolver.forVisionTasks('https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.10/wasm');
        const landmarker = await PoseLandmarker.createFromOptions(fileset, {
          baseOptions: {
            modelAssetPath: 'https://storage.googleapis.com/mediapipe-models/pose_landmarker/pose_landmarker_lite/float16/1/pose_landmarker_lite.task'
          },
          runningMode: 'VIDEO',
          numPoses: 1,
          minPoseDetectionConfidence: 0.5,
          minPosePresenceConfidence: 0.5,
          minTrackingConfidence: 0.5,
        });

        // Camera
        setStatus('Requesting camera…');
        const video = document.getElementById('video');
        const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'user' }, audio: false }).catch(err => {
          setStatus('Camera error'); postMsg('error', String(err?.message || err)); throw err;
        });
        video.srcObject = stream;
        await video.play();

        const overlay = document.getElementById('overlay');
        const ctx = overlay.getContext('2d');
        function resize(){
          const w = video.videoWidth || overlay.clientWidth || window.innerWidth;
          const h = video.videoHeight || overlay.clientHeight || window.innerHeight;
          overlay.width = w; overlay.height = h;
        }
        resize();
        window.addEventListener('resize', resize);

        const draw = new DrawingUtils(ctx);
        let reps = 0; let phaseDown = false; let lastReport = -1;
        document.getElementById('reps').textContent = String(reps);
        postMsg('ready', { ok: true });
        setStatus('Detecting…');

        let angleHistory = []; let downFrames = 0; let upFrames = 0;
        function handleLandmarks(landmarks){
          if (!landmarks || landmarks.length === 0) return;
          const lm = landmarks[0];
          const L = { hip: lm[23], knee: lm[25], ankle: lm[27] };
          const R = { hip: lm[24], knee: lm[26], ankle: lm[28] };
          if (!L.hip || !L.knee || !L.ankle || !R.hip || !R.knee || !R.ankle) return;
          const lAng = angleDeg(L.hip.x,L.hip.y,L.knee.x,L.knee.y,L.ankle.x,L.ankle.y);
          const rAng = angleDeg(R.hip.x,R.hip.y,R.knee.x,R.knee.y,R.ankle.x,R.ankle.y);
          const ang = (lAng + rAng) / 2;
          angleHistory.push(ang); if (angleHistory.length > 8) angleHistory.shift();
          const smooth = angleHistory.reduce((s,a)=>s+a,0)/angleHistory.length;
          const downThresh = 100, upThresh = 160;
          if (!phaseDown) {
            if (smooth < downThresh) { downFrames++; upFrames = 0; } else { downFrames = Math.max(0, downFrames-1); }
            if (downFrames >= 3) { phaseDown = true; downFrames = 0; }
          } else {
            if (smooth > upThresh) { upFrames++; downFrames = 0; } else { upFrames = Math.max(0, upFrames-1); }
            if (upFrames >= 4) { phaseDown = false; upFrames = 0; reps += 1; document.getElementById('reps').textContent = String(reps); if (reps !== lastReport) { lastReport = reps; postMsg('reps',{reps}); } }
          }
        }

        function loop(){
          const now = performance.now();
          const w = overlay.width, h = overlay.height;
          const result = landmarker.detectForVideo(video, now);

          ctx.clearRect(0,0,w,h);
          if (result?.landmarks && result.landmarks.length > 0) {
            for (const lms of result.landmarks) {
              draw.drawLandmarks(lms, { radius: 2, color: '#00E7FF' });
              draw.drawConnectors(lms, PoseLandmarker.POSE_LANDMARKS_LEFT, { color: '#6A00FF', lineWidth: 2 });
              draw.drawConnectors(lms, PoseLandmarker.POSE_LANDMARKS_RIGHT, { color: '#00FFC6', lineWidth: 2 });
              draw.drawConnectors(lms, PoseLandmarker.POSE_LANDMARKS_NEUTRAL, { color: '#CCCCCC', lineWidth: 1 });
            }
            handleLandmarks(result.landmarks, w, h);
          }
          requestAnimationFrame(loop);
        }
        requestAnimationFrame(loop);

        // Listen for parent messages (reset, ping)
        window.addEventListener('message', (ev) => {
          const data = ev?.data || {};
          if (data && data.type === 'reset') {
            reps = 0; phaseDown = false; lastReport = -1;
            document.getElementById('reps').textContent = '0';
            postMsg('reps', { reps });
          }
        });
      })().catch((e) => { setStatus('Init failed'); postMsg('error', String(e && e.message || e)); });
    </script>
  </body>
  </html>
